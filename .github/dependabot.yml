version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    exclude-paths:
      - "tests/**"
      - "page/app/tests/**"

  - package-ecosystem: "docker"
    directory: "/tests/e2e"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/tests/release"
    schedule:
      interval: "weekly"
