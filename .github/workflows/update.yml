name: update codependencies

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read

jobs:
  update-deps:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - run: bun run update
      - run: bun install
      - run: bun run deps:security

      - name: Build Codependence
        run: bun run build

      - name: Apply Codependence policies
        uses: ./
        with:
          update: true

      - name: Refresh lockfile
        run: bun install

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PR_CREATE_TOKEN }}
          commit-message: Update dependencies
          title: '[Codependence] update dependencies'
          body: |
            ## Dependency updates

            Auto-generated by [Codependence][1] using [create-pull-request][2]

            [1]: https://github.com/yowainwright/codependence
            [2]: https://github.com/peter-evans/create-pull-request
          branch: update-dependencies
          labels: codependencies
