name: codependence e2e tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        
      - name: Run e2e init tests
        run: ./tests/e2e/test-multilang.sh init
          
      - name: Test Docker environment (dev mode)
        run: ./tests/e2e/test-multilang.sh verify-init-env
          
      - name: Cleanup Docker images
        if: always()
        run: ./tests/e2e/test-multilang.sh clean
