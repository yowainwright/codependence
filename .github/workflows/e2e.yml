name: codependence e2e tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        
      - name: Run e2e init tests
        run: ./tests/e2e/test-multilang.sh init
          
      - name: Test Docker environment (dev mode)
        run: ./tests/e2e/test-multilang.sh verify-init-env
          
      - name: Cleanup Docker images
        if: always()
        run: ./tests/e2e/test-multilang.sh clean
