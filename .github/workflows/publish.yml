name: publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - run: bun test tests/unit/
        env:
          CI: true

      - run: bun run build-dist

      - name: Resolve npm dist-tag
        id: dist-tag
        run: bash scripts/ci/publish-release.sh resolve-dist-tag
        env:
          VERSION: ${{ github.ref_name }}

      - name: Pack npm tarball
        id: pack
        run: bash scripts/ci/publish-release.sh pack

      - name: Attest npm tarball
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Prepare release attestation
        id: release-attestation
        run: bash scripts/ci/publish-release.sh prepare-attestation
        env:
          ATTESTATION_BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          TARBALL: ${{ steps.pack.outputs.tarball }}

      - name: Publish npm package
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        run: bash scripts/ci/publish-release.sh publish-npm

      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SIGSTORE_BUNDLE: ${{ steps.release-attestation.outputs.sigstore_bundle }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          VERSION: ${{ github.ref_name }}
        run: bash scripts/ci/publish-release.sh publish-github-release-assets
