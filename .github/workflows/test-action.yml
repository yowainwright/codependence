name: Test Action

on:
  pull_request:
    paths:
      - "action.yml"
      - "src/**"
      - "package.json"
      - "tests/e2e/**"
      - "tests/integration/**"
      - ".github/workflows/test-action.yml"
  push:
    branches: [main]
    paths:
      - "action.yml"
      - "src/**"
      - "package.json"
      - "tests/e2e/**"
      - "tests/integration/**"
      - ".github/workflows/test-action.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  build:
    name: Build Codependence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Build
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  test-node-check:
    name: Test Node Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Setup Node fixture
        run: |
          mkdir -p /tmp/codependence-node
          cat > /tmp/codependence-node/package.json <<'EOF'
          {
            "name": "codependence-node-action-test",
            "version": "1.0.0",
            "dependencies": {
              "lodash": "4.17.21"
            }
          }
          EOF
          cat > /tmp/codependence-node/.codependencerc <<'EOF'
          {"codependencies":[{"lodash":"4.17.21"}],"mode":"verbose"}
          EOF

      - name: Run Codependence Action
        id: codependence
        uses: ./
        with:
          config: /tmp/codependence-node/.codependencerc
          rootDir: /tmp/codependence-node
          fail-on-outdated: true

      - name: Verify output
        run: |
          test "${{ steps.codependence.outputs.outdated }}" = "false"

  test-node-outdated:
    name: Test Node Outdated Output
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Setup outdated fixture
        run: |
          mkdir -p /tmp/codependence-outdated
          cat > /tmp/codependence-outdated/package.json <<'EOF'
          {
            "name": "codependence-outdated-action-test",
            "version": "1.0.0",
            "dependencies": {
              "lodash": "4.17.0"
            }
          }
          EOF
          cat > /tmp/codependence-outdated/.codependencerc <<'EOF'
          {"codependencies":[{"lodash":"4.17.21"}],"mode":"verbose"}
          EOF

      - name: Run Codependence Action
        id: codependence
        uses: ./
        with:
          config: /tmp/codependence-outdated/.codependencerc
          rootDir: /tmp/codependence-outdated
          fail-on-outdated: false

      - name: Verify output
        run: |
          test "${{ steps.codependence.outputs.outdated }}" = "true"

  test-python-check:
    name: Test Python Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Setup Python fixture
        run: |
          mkdir -p /tmp/codependence-python
          cat > /tmp/codependence-python/requirements.txt <<'EOF'
          requests==2.28.0
          EOF
          cat > /tmp/codependence-python/.codependencerc <<'EOF'
          {"codependencies":[{"requests":"==2.28.0"}],"language":"python","mode":"verbose"}
          EOF

      - name: Run Codependence Action
        id: codependence
        uses: ./
        with:
          config: /tmp/codependence-python/.codependencerc
          rootDir: /tmp/codependence-python
          language: python
          fail-on-outdated: true

      - name: Verify output
        run: |
          test "${{ steps.codependence.outputs.outdated }}" = "false"

  test-go-check:
    name: Test Go Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Setup Go fixture
        run: |
          mkdir -p /tmp/codependence-go
          cat > /tmp/codependence-go/go.mod <<'EOF'
          module github.com/example/action-test

          go 1.21

          require github.com/gin-gonic/gin v1.9.0
          EOF
          touch /tmp/codependence-go/go.sum
          cat > /tmp/codependence-go/.codependencerc <<'EOF'
          {
            "targets": [
              {
                "manager": "go",
                "rootDir": "/tmp/codependence-go",
                "files": ["go.mod"],
                "codependencies": [{"github.com/gin-gonic/gin":"v1.9.0"}],
                "mode": "verbose"
              }
            ]
          }
          EOF

      - name: Run Codependence Action
        id: codependence
        uses: ./
        with:
          config: /tmp/codependence-go/.codependencerc
          targets: go
          version: 1.24.5
          fail-on-outdated: true

      - name: Verify output
        run: |
          test "${{ steps.codependence.outputs.outdated }}" = "false"

      - name: Remove lockfile
        run: rm /tmp/codependence-go/go.sum

      - name: Verify missing lockfile failure
        id: missing-lockfile
        continue-on-error: true
        uses: ./
        with:
          config: /tmp/codependence-go/.codependencerc
          targets: go
          version: 1.24.5

      - name: Check missing lockfile result
        run: test "${{ steps.missing-lockfile.outcome }}" = "failure"

  test-rust-check:
    name: Test Rust Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Setup Rust fixture
        run: |
          mkdir -p /tmp/codependence-rust
          cp tests/e2e/fixtures/rust-Cargo.toml.fixture /tmp/codependence-rust/Cargo.toml
          touch /tmp/codependence-rust/Cargo.lock
          cat > /tmp/codependence-rust/.codependencerc <<'EOF'
          {
            "targets": [
              {
                "manager": "rust",
                "rootDir": "/tmp/codependence-rust",
                "files": [
                  "Cargo.toml"
                ],
                "codependencies": [
                  {
                    "serde": "1.0.190"
                  }
                ],
                "mode": "verbose"
              }
            ]
          }
          EOF

      - name: Run Codependence Action
        id: codependence
        uses: ./
        with:
          config: /tmp/codependence-rust/.codependencerc
          targets: rust
          version: v1.88.0
          fail-on-outdated: true

      - name: Verify Rust setup
        run: |
          rustc --version | grep -q 'rustc 1.88.0'

      - name: Reject unsupported Rust version suffix
        id: unsupported-rust-version
        continue-on-error: true
        uses: ./
        with:
          config: /tmp/codependence-rust/.codependencerc
          targets: rust
          version: 1.88.0-rc.1

      - name: Check unsupported Rust version result
        run: test "${{ steps.unsupported-rust-version.outcome }}" = "failure"

  test-uv-check:
    name: Test uv Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Setup uv fixture
        run: |
          mkdir -p /tmp/codependence-uv
          cp tests/e2e/fixtures/python-uv-pyproject.toml.fixture /tmp/codependence-uv/pyproject.toml
          cp tests/e2e/fixtures/uv.lock.fixture /tmp/codependence-uv/uv.lock
          cat > /tmp/codependence-uv/.codependencerc <<'EOF'
          {
            "targets": [
              {
                "manager": "uv",
                "rootDir": "/tmp/codependence-uv",
                "files": [
                  "pyproject.toml"
                ],
                "codependencies": [
                  {
                    "requests": "==2.31.0"
                  }
                ],
                "mode": "verbose"
              }
            ]
          }
          EOF

      - name: Run Codependence Action for uv
        uses: ./
        with:
          config: /tmp/codependence-uv/.codependencerc
          targets: uv
          version: 0.8.0
          fail-on-outdated: true

      - name: Verify uv setup
        run: |
          uv --version | grep -q '0.8.0'

  test-docker-check:
    name: Test Docker Registry Check
    needs: build
    runs-on: ubuntu-latest
    env:
      FIXTURE_ROOT: /tmp/codependence-docker
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Download build artifacts
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dist
          path: dist/

      - name: Setup Docker fixture
        run: |
          mkdir -p "$FIXTURE_ROOT"
          printf 'FROM alpine:3.19\n' > "$FIXTURE_ROOT/Dockerfile"
          cat > "$FIXTURE_ROOT/.codependencerc" <<'EOF'
          {
            "targets": [
              {
                "manager": "docker",
                "rootDir": "/tmp/codependence-docker",
                "mode": "precise"
              }
            ]
          }
          EOF

      - name: Run Codependence Action for Docker
        id: codependence
        uses: ./
        with:
          config: /tmp/codependence-docker/.codependencerc
          targets: docker
          update: true
          noCache: true

      - name: Verify Docker update
        run: |
          test "${{ steps.codependence.outputs.outdated }}" = "false"
          if grep -q '^FROM alpine:3.19$' "$FIXTURE_ROOT/Dockerfile"; then
            exit 1
          fi
          grep -Eq '^FROM alpine:[0-9]+(\.[0-9]+){0,2}$' "$FIXTURE_ROOT/Dockerfile"

  test-github-actions-check:
    name: Test GitHub Actions Check
    needs: build
    runs-on: ubuntu-latest
    env:
      FIXTURE_ROOT: /tmp/codependence-github-actions
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Setup GitHub Actions fixture
        run: |
          mkdir -p "$FIXTURE_ROOT/.github/workflows"
          ACTION_KEY=uses
          cat > "$FIXTURE_ROOT/.github/workflows/ci.yml" <<EOF
          name: CI
          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - $ACTION_KEY: actions/checkout@v1
          EOF
          cat > "$FIXTURE_ROOT/.codependencerc" <<'EOF'
          {
            "codependencies": [
              "actions/checkout"
            ],
            "files": [
              ".github/workflows/ci.yml"
            ],
            "language": "github-actions",
            "mode": "verbose"
          }
          EOF

      - name: Run Codependence Action
        id: codependence
        uses: ./
        with:
          config: /tmp/codependence-github-actions/.codependencerc
          rootDir: /tmp/codependence-github-actions
          language: github-actions
          update: true

      - name: Verify output
        run: |
          test "${{ steps.codependence.outputs.outdated }}" = "false"
          ! grep -q "uses: actions/checkout@v1$" "$FIXTURE_ROOT/.github/workflows/ci.yml"

  summary:
    name: Test Summary
    needs:
      [
        test-node-check,
        test-node-outdated,
        test-python-check,
        test-go-check,
        test-rust-check,
        test-uv-check,
        test-docker-check,
        test-github-actions-check,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test-node-check.result }}" != "success" ] || \
             [ "${{ needs.test-node-outdated.result }}" != "success" ] || \
             [ "${{ needs.test-python-check.result }}" != "success" ] || \
             [ "${{ needs.test-go-check.result }}" != "success" ] || \
             [ "${{ needs.test-rust-check.result }}" != "success" ] || \
             [ "${{ needs.test-uv-check.result }}" != "success" ] || \
             [ "${{ needs.test-docker-check.result }}" != "success" ] || \
             [ "${{ needs.test-github-actions-check.result }}" != "success" ]; then
            echo "One or more action tests failed"
            exit 1
          fi
          echo "All action tests passed."
