name: Test Published Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Published codependence version to test (leave empty for latest on npm)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  published-release-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Determine Version to Test
        id: version
        run: bash scripts/ci/published-release_test.sh resolve-version
        env:
          INPUT_VERSION: ${{ inputs.version }}

      - name: Wait for NPM Package Availability
        run: bash scripts/ci/published-release_test.sh wait-for-npm
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}

      - name: Build Test Docker Image
        run: bash scripts/ci/published-release_test.sh build-release-image
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}

      - name: Verify Installation
        run: bash scripts/ci/published-release_test.sh verify-installation

      - name: Run Full E2E Test Suite
        run: bash scripts/ci/published-release_test.sh run-e2e

      - name: Run NPM Package Smoke Test
        run: bash scripts/ci/published-release_test.sh run-npm-smoke
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}

      - name: Performance and Compatibility Check
        run: bash scripts/ci/published-release_test.sh compatibility-check

      - name: Report Test Results
        run: bash scripts/ci/published-release_test.sh summary
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}

      - name: Trigger External E2E Tests
        if: success()
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: yowainwright/codependence-test
          event-type: codependence-release
          client-payload: '{"version":"${{ steps.version.outputs.version }}","release_url":"${{ github.event.release.html_url }}","trigger_type":"${{ github.event_name }}"}'

      - name: Create Test Report
        if: always()
        run: bash scripts/ci/published-release_test.sh write-report
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}
