name: Test Published Release
on:
  release:
    types: [published]
  workflow_call:
    inputs:
      version:
        description: Published codependence version to test
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Published codependence version to test (leave empty for latest on npm)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  published-release-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Determine Version to Test
        id: version
        run: bash scripts/ci/published-release_test.sh resolve-version
        env:
          INPUT_VERSION: ${{ inputs.version }}

      - name: Wait for NPM Package Availability
        run: bash scripts/ci/published-release_test.sh wait-for-npm
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}

      - name: Build Test Docker Image
        run: bash scripts/ci/published-release_test.sh build-release-image
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}

      - name: Verify Installation
        run: bash scripts/ci/published-release_test.sh verify-installation

      - name: Run Full E2E Test Suite
        run: bash scripts/ci/published-release_test.sh run-e2e

      - name: Run NPM Package Smoke Test
        run: bash scripts/ci/published-release_test.sh run-npm-smoke
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}

      - name: Performance and Compatibility Check
        run: bash scripts/ci/published-release_test.sh compatibility-check

      - name: Report Test Results
        run: bash scripts/ci/published-release_test.sh summary
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}

      - name: Create Test Report
        if: success()
        run: bash scripts/ci/published-release_test.sh write-report
        env:
          CODEPENDENCE_VERSION: ${{ steps.version.outputs.version }}
