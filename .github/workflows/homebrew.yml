name: Publish Homebrew formula

on:
  workflow_call:
    inputs:
      version:
        description: Stable npm version to publish to Homebrew
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Stable npm version to publish to Homebrew
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: homebrew-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build-binary:
    strategy:
      matrix:
        include:
          - runner: macos-15
            asset: codependence-darwin-arm64
          - runner: macos-15-intel
            asset: codependence-darwin-x64
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: v${{ inputs.version }}

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Validate release version
        run: |
          node scripts/ci/homebrew-release.js validate-version
          node scripts/ci/homebrew-release.js validate-package-version

      - name: Build and test Perry binary
        run: bun run test:e2e:binary

      - name: Prepare architecture asset
        env:
          ASSET: ${{ matrix.asset }}
        run: mv artifacts/codependence "$ASSET"

      - name: Upload tested binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1

  publish-binaries:
    needs: build-binary
    runs-on: ubuntu-24.04
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    env:
      BINARY_ARCHIVE: codependence-darwin.tar.gz
      FORMULA_PATH: codependence.rb
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: v${{ inputs.version }}

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          cache: "false"
          install: "false"

      - name: Download tested binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: codependence-darwin-*
          path: artifacts
          merge-multiple: true

      - name: Validate coordinated npm release
        env:
          CODEPENDENCE_VERSION: ${{ inputs.version }}
        run: |
          node scripts/ci/homebrew-release.js validate-package-version
          node scripts/ci/published-release.js wait-for-npm

      - name: Reuse published Homebrew archive
        id: published-archive
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="v${VERSION}"
          ASSET_URL="$(gh release view "$RELEASE_TAG" --json assets --jq ".assets[] | select(.name == \"$BINARY_ARCHIVE\") | .url")"
          if [ -z "$ASSET_URL" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh release download "$RELEASE_TAG" --pattern "$BINARY_ARCHIVE"
          echo "exists=true" >> "$GITHUB_OUTPUT"

      - name: Create Perry binary archive
        if: steps.published-archive.outputs.exists != 'true'
        run: |
          chmod +x artifacts/codependence-darwin-arm64 artifacts/codependence-darwin-x64
          tar -czf "$BINARY_ARCHIVE" -C artifacts codependence-darwin-arm64 codependence-darwin-x64

      - name: Generate formula from Perry binary archive
        run: node scripts/ci/homebrew-release.js

      - name: Attest Perry binary archive
        if: steps.published-archive.outputs.exists != 'true'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ env.BINARY_ARCHIVE }}

      - name: Publish immutable Homebrew archive
        if: steps.published-archive.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="v${VERSION}"
          gh release view "$RELEASE_TAG"
          gh release upload "$RELEASE_TAG" "$BINARY_ARCHIVE"

      - name: Upload formula for verification
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: homebrew-formula
          path: codependence.rb
          if-no-files-found: error
          retention-days: 1

  test-formula:
    needs: publish-binaries
    strategy:
      matrix:
        runner:
          - macos-15
          - macos-15-intel
    runs-on: ${{ matrix.runner }}
    env:
      TAP_NAME: codependence/release-test

    steps:
      - name: Download formula
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: homebrew-formula

      - name: Create formula test tap
        run: |
          brew tap-new --no-git "$TAP_NAME"
          TAP_PATH="$(brew --repository "$TAP_NAME")"
          cp codependence.rb "$TAP_PATH/Formula/codependence.rb"

      - name: Audit, install, and test formula
        run: |
          brew audit --strict --online "$TAP_NAME/codependence"
          brew install "$TAP_NAME/codependence"
          brew test "$TAP_NAME/codependence"
          codependence --help
          cdp --help

  publish-formula:
    needs: test-formula
    runs-on: ubuntu-24.04
    environment: homebrew-publish
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Download verified formula
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: homebrew-formula

      - name: Attach formula to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="v${VERSION}"
          ASSET_URL="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[] | select(.name == "codependence.rb") | .url')"
          if [ -z "$ASSET_URL" ]; then
            gh release upload "$RELEASE_TAG" codependence.rb
            exit 0
          fi
          mkdir existing-formula
          gh release download "$RELEASE_TAG" --pattern codependence.rb --dir existing-formula
          cmp -s codependence.rb existing-formula/codependence.rb

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_BRANCH: codependence-${{ inputs.version }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          test -n "$GH_TOKEN"
          gh repo clone yowainwright/homebrew-tap tap
          if cmp -s codependence.rb tap/Formula/codependence.rb; then
            exit 0
          fi
          cd tap
          git switch -c "$TAP_BRANCH"
          cp ../codependence.rb Formula/codependence.rb
          git add Formula/codependence.rb
          git -c user.name=github-actions -c user.email=41898282+github-actions[bot]@users.noreply.github.com commit -m "codependence $VERSION"
          git push --set-upstream origin "$TAP_BRANCH"
          gh pr create --base main --head "$TAP_BRANCH" --title "codependence $VERSION" --body "Automated formula update for codependence $VERSION."
