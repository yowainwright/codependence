name: codependence e2e multilang tests 🌍

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-multilang-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run e2e Python and Go tests
        run: ./tests/e2e/test-multilang.sh multilang

      - name: Run Go update e2e tests
        run: ./tests/e2e/test-multilang.sh go-update

      - name: Test Docker environment (Python + Go)
        run: |
          echo "🔧 Testing multi-language environment setup..."
          docker run --rm --entrypoint=/bin/sh codependence-multilang-test:latest -c "
            echo '📦 Checking Node.js...'
            node --version &&
            echo '🐍 Checking Python...'
            python3 --version &&
            pip3 --version &&
            poetry --version &&
            echo '🐹 Checking Go...'
            go version &&
            echo '✅ All language environments verified!'
          "

      - name: Cleanup Docker images
        if: always()
        run: |
          echo "🧹 Cleaning up Docker resources..."
          docker rmi codependence-multilang-test:latest || true
          docker system prune -f || true
