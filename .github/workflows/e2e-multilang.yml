name: codependence e2e multilang tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-multilang-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run e2e Python and Go tests
        run: ./tests/e2e/test-multilang.sh multilang

      - name: Run Go update e2e tests
        run: ./tests/e2e/test-multilang.sh go-update

      - name: Run provider update e2e tests
        run: ./tests/e2e/test-multilang.sh provider-updates

      - name: Run packed install smoke tests
        run: ./tests/e2e/test-multilang.sh packed-install

      - name: Test Docker environment (Python + Go)
        run: ./tests/e2e/test-multilang.sh verify-multilang-env

      - name: Cleanup Docker images
        if: always()
        run: ./tests/e2e/test-multilang.sh clean
