name: codependence e2e multilang tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-multilang-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Run e2e Python and Go tests
        run: ./tests/e2e/test-multilang.sh multilang

      - name: Run Go update e2e tests
        run: ./tests/e2e/test-multilang.sh go-update

      - name: Test Docker environment (Python + Go)
        run: ./tests/e2e/test-multilang.sh verify-multilang-env

      - name: Cleanup Docker images
        if: always()
        run: ./tests/e2e/test-multilang.sh clean
