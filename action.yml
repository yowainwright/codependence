name: "Codependence"
description: "Check and update dependencies to ensure they are up-to-date or match specified versions"
author: "Jeff Wainwright"
branding:
  icon: "package"
  color: "blue"

inputs:
  codependencies:
    description: 'Space-separated list of dependencies to check (e.g., "lodash react")'
    required: false
  config:
    description: "Path to config file"
    required: false
  files:
    description: "File glob patterns (space-separated)"
    required: false
  update:
    description: "Update dependencies based on check (true/false)"
    required: false
    default: "false"
  permissive:
    description: "Update all dependencies to latest except those in codependencies (true/false)"
    required: false
    default: "false"
  fail-on-outdated:
    description: "Fail the action if dependencies are outdated (true/false)"
    required: false
    default: "true"
  rootDir:
    description: "Root directory to start search"
    required: false
  ignore:
    description: "Ignore glob patterns (space-separated)"
    required: false
  silent:
    description: "Enable silent logging (true/false)"
    required: false
    default: "false"
  debug:
    description: "Enable debug logging (true/false)"
    required: false
    default: "false"
  yarnConfig:
    description: "Enable yarn config support (true/false)"
    required: false
    default: "false"
  language:
    description: "Target language for this run (nodejs, go, python)"
    required: false
  level:
    description: "Update level: patch, minor, or major"
    required: false
  mode:
    description: "Listing mode: verbose or precise"
    required: false
  dryRun:
    description: "Show what would change without modifying files (true/false)"
    required: false
    default: "false"
  verbose:
    description: "Enable verbose logging (true/false)"
    required: false
    default: "false"
  quiet:
    description: "Suppress all output except errors (true/false)"
    required: false
    default: "false"
  noCache:
    description: "Disable version caching for fresh results (true/false)"
    required: false
    default: "false"
  format:
    description: "Output format: json, markdown, or table"
    required: false
  outputFile:
    description: "Write output to file instead of stdout"
    required: false

outputs:
  outdated:
    description: "Whether any dependencies were outdated (true/false)"
    value: ${{ steps.codependence.outputs.outdated }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install Codependence
      shell: bash
      env:
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail

        VERSION="${ACTION_REF#v}"
        if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
          npm install -g "codependence@$VERSION"
        else
          npm install -g codependence
        fi

    - name: Run Codependence
      id: codependence
      shell: bash
      env:
        CODEPENDENCIES: ${{ inputs.codependencies }}
        CONFIG: ${{ inputs.config }}
        FILES: ${{ inputs.files }}
        UPDATE: ${{ inputs.update }}
        PERMISSIVE: ${{ inputs.permissive }}
        FAIL_ON_OUTDATED: ${{ inputs.fail-on-outdated }}
        ROOT_DIR: ${{ inputs.rootDir }}
        IGNORE: ${{ inputs.ignore }}
        SILENT: ${{ inputs.silent }}
        DEBUG: ${{ inputs.debug }}
        YARN_CONFIG: ${{ inputs.yarnConfig }}
        LANGUAGE: ${{ inputs.language }}
        LEVEL: ${{ inputs.level }}
        MODE: ${{ inputs.mode }}
        DRY_RUN: ${{ inputs.dryRun }}
        VERBOSE: ${{ inputs.verbose }}
        QUIET: ${{ inputs.quiet }}
        NO_CACHE: ${{ inputs.noCache }}
        FORMAT: ${{ inputs.format }}
        OUTPUT_FILE: ${{ inputs.outputFile }}
      run: |
        set +e

        ARGS=()

        append_words() {
          local flag="$1"
          local words="$2"
          [ -z "$words" ] && return

          read -r -a values <<< "$words"
          for value in "${values[@]}"; do
            ARGS+=("$flag" "$value")
          done
        }

        append_value() {
          local flag="$1"
          local value="$2"
          [ -z "$value" ] && return
          ARGS+=("$flag" "$value")
        }

        append_bool() {
          local flag="$1"
          local value="$2"
          [ "$value" = "true" ] && ARGS+=("$flag")
        }

        append_words "--codependencies" "$CODEPENDENCIES"
        append_words "--files" "$FILES"
        append_words "--ignore" "$IGNORE"
        append_value "--config" "$CONFIG"
        append_value "--rootDir" "$ROOT_DIR"
        append_value "--language" "$LANGUAGE"
        append_value "--level" "$LEVEL"
        append_value "--mode" "$MODE"
        append_value "--format" "$FORMAT"
        append_value "--outputFile" "$OUTPUT_FILE"
        append_bool "--update" "$UPDATE"
        append_bool "--permissive" "$PERMISSIVE"
        append_bool "--silent" "$SILENT"
        append_bool "--debug" "$DEBUG"
        append_bool "--yarnConfig" "$YARN_CONFIG"
        append_bool "--dryRun" "$DRY_RUN"
        append_bool "--verbose" "$VERBOSE"
        append_bool "--quiet" "$QUIET"
        append_bool "--noCache" "$NO_CACHE"

        printf 'Running: codependence'
        printf ' %q' "${ARGS[@]}"
        printf '\n'
        codependence "${ARGS[@]}"
        EXIT_CODE=$?

        if [ $EXIT_CODE -ne 0 ]; then
          echo "outdated=true" >> $GITHUB_OUTPUT
          if [ "$FAIL_ON_OUTDATED" = "true" ]; then
            echo "::error::Dependencies are outdated. Run 'codependence --update' to fix."
            exit 1
          fi
        else
          echo "outdated=false" >> $GITHUB_OUTPUT
        fi

        exit 0
