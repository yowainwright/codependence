name: 'Codependence'
description: 'Check and update dependencies to ensure they are up-to-date or match specified versions'
author: 'Jeff Wainwright'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  codependencies:
    description: 'Space-separated list of dependencies to check (e.g., "lodash react")'
    required: false
  config:
    description: 'Path to config file'
    required: false
  files:
    description: 'File glob patterns (space-separated)'
    required: false
  update:
    description: 'Update dependencies based on check (true/false)'
    required: false
    default: 'false'
  permissive:
    description: 'Update all dependencies to latest except those in codependencies (true/false)'
    required: false
    default: 'false'
  fail-on-outdated:
    description: 'Fail the action if dependencies are outdated (true/false)'
    required: false
    default: 'true'
  rootDir:
    description: 'Root directory to start search'
    required: false
  ignore:
    description: 'Ignore glob patterns (space-separated)'
    required: false
  silent:
    description: 'Enable silent logging (true/false)'
    required: false
    default: 'false'
  debug:
    description: 'Enable debug logging (true/false)'
    required: false
    default: 'false'
  yarnConfig:
    description: 'Enable yarn config support (true/false)'
    required: false
    default: 'false'

outputs:
  outdated:
    description: 'Whether any dependencies were outdated (true/false)'
    value: ${{ steps.codependence.outputs.outdated }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Codependence
      shell: bash
      run: npm install -g 'codependence@^1.0.0'

    - name: Run Codependence
      id: codependence
      shell: bash
      env:
        INPUT_CODEDEPENDENCIES: ${{ inputs.codependencies }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_FILES: ${{ inputs.files }}
        INPUT_UPDATE: ${{ inputs.update }}
        INPUT_PERMISSIVE: ${{ inputs.permissive }}
        INPUT_FAIL_ON_OUTDATED: ${{ inputs.fail-on-outdated }}
        INPUT_ROOT_DIR: ${{ inputs.rootDir }}
        INPUT_IGNORE: ${{ inputs.ignore }}
        INPUT_SILENT: ${{ inputs.silent }}
        INPUT_DEBUG: ${{ inputs.debug }}
        INPUT_YARN_CONFIG: ${{ inputs.yarnConfig }}
      run: |
        set +e

        CMD=(codependence)

        # Add codependencies
        if [ -n "$INPUT_CODEDEPENDENCIES" ]; then
          CMD+=(--codependencies)
          for dep in $INPUT_CODEDEPENDENCIES; do
            CMD+=("$dep")
          done
        fi

        # Add config
        [ -n "$INPUT_CONFIG" ] && CMD+=(--config "$INPUT_CONFIG")

        # Add files
        if [ -n "$INPUT_FILES" ]; then
          CMD+=(--files)
          for file in $INPUT_FILES; do
            CMD+=("$file")
          done
        fi

        # Add update flag
        [ "$INPUT_UPDATE" = "true" ] && CMD+=(--update)

        # Add permissive flag
        [ "$INPUT_PERMISSIVE" = "true" ] && CMD+=(--permissive)

        # Add rootDir
        [ -n "$INPUT_ROOT_DIR" ] && CMD+=(--rootDir "$INPUT_ROOT_DIR")

        # Add ignore patterns
        if [ -n "$INPUT_IGNORE" ]; then
          CMD+=(--ignore)
          for pattern in $INPUT_IGNORE; do
            CMD+=("$pattern")
          done
        fi

        # Add logging flags
        [ "$INPUT_SILENT" = "true" ] && CMD+=(--silent)
        [ "$INPUT_DEBUG" = "true" ] && CMD+=(--debug)

        # Add yarn config
        [ "$INPUT_YARN_CONFIG" = "true" ] && CMD+=(--yarnConfig)

        echo "Running: ${CMD[*]}"
        "${CMD[@]}"
        EXIT_CODE=$?

        if [ $EXIT_CODE -ne 0 ]; then
          echo "outdated=true" >> $GITHUB_OUTPUT
          if [ "$INPUT_FAIL_ON_OUTDATED" = "true" ]; then
            echo "::error::Dependencies are outdated. Run 'codependence --update' to fix."
            exit 1
          fi
        else
          echo "outdated=false" >> $GITHUB_OUTPUT
        fi

        exit 0
