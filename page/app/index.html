<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Codependence enforces dependency version policy across local development, workspaces, and CI." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/codependence/logos/codependence.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/codependence/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/codependence/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/codependence/apple-touch-icon.png" />
    <title>Codependence</title>
    <script>
      function getTheme() {
        var saved = localStorage.getItem("theme");
        if (saved) return saved;
        return window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "codependence-dark"
          : "codependence-light";
      }
      function handleRedirect() {
        var redirect = sessionStorage.getItem("spa-redirect");
        if (!redirect) return;
        sessionStorage.removeItem("spa-redirect");
        var base = "/codependence";
        var p = redirect.startsWith(base) ? redirect.slice(base.length) : redirect;
        if (p && p !== "/") history.replaceState(null, "", base + p);
      }
      document.documentElement.setAttribute("data-theme", getTheme());
      handleRedirect();
    </script>
    <style>
      * { scroll-behavior: smooth; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
