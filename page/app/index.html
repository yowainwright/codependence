<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Codependence enforces dependency version policy across local development, workspaces, and CI."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/codependence/logos/codependence.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/codependence/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/codependence/favicon-16x16.png" />
    <title>Codependence</title>
    <script>
      const storedTheme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme =
        storedTheme === "codependence-light" || storedTheme === "codependence-dark"
          ? storedTheme
          : prefersDark
            ? "codependence-dark"
            : "codependence-light";
      document.documentElement.setAttribute("data-theme", theme);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
